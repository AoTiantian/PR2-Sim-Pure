/pr2/controller_manager:
  ros__parameters:
    update_rate: 1000

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    pr2_omni_controller:
      type: pr2_omni_controller/OmniController

/pr2/joint_state_broadcaster:
  ros__parameters:
    update_rate: 100

/pr2/pr2_omni_controller:
  ros__parameters:
    steer_joints:
      - fl_caster_rotation_joint
      - fr_caster_rotation_joint
      - bl_caster_rotation_joint
      - br_caster_rotation_joint

    wheel_left_joints:
      - fl_caster_l_wheel_joint
      - fr_caster_l_wheel_joint
      - bl_caster_l_wheel_joint
      - br_caster_l_wheel_joint

    wheel_right_joints:
      - fl_caster_r_wheel_joint
      - fr_caster_r_wheel_joint
      - bl_caster_r_wheel_joint
      - br_caster_r_wheel_joint

    wheel_diameter: 0.149584
    wheel_track: 0.098
    wheelbase_x: 0.2246
    wheelbase_y: 0.2246

    min_steer_speed: 0.01
    max_vx: 0.8
    max_vy: 0.8
    max_wz: 1.0
